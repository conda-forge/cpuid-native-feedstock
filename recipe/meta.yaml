{% set name = "cpuid-native" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cpuid_native-{{ version }}.tar.gz
  sha256: 7f032c455083f6161056f8ff51225e79ef14154cdae577b911e37c1281d93026

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - pip
    - python
  run:
    - python

test:
  imports:
    - cpuid_native
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/fpelliccioni/cpuid-py-native
  summary: x86 cpuid native API
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
